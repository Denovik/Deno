<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>
<style>
  :root{
    --bg:#070b14; --panel:#0a1120; --cyan:#34d0ff; --cyan-soft:#8fd3ff;
    --line:rgba(80,180,255,0.12); --text:#cfe8ff; --muted:#46668c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 30%, #0d1830 0%, #070b14 70%);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);overflow:hidden}
  .app{height:100vh;display:flex;flex-direction:column;max-width:820px;margin:0 auto}

  /* Topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan)}
  .brand .name{font-weight:600;letter-spacing:4px;font-size:15px;color:#eaf6ff}
  .meta{font-size:11px;letter-spacing:1px;color:#5f86b3}

  /* Reactor */
  .stage{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 20px 18px}
  .orb{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;
    --level:0; transition:transform .2s}
  .ring{position:absolute;border-radius:50%;border:1px solid rgba(52,208,255,0.3)}
  .r1{width:220px;height:220px;border-color:rgba(52,208,255,0.16);animation:spin 16s linear infinite}
  .r2{width:166px;height:166px;border-color:rgba(52,208,255,0.28);border-top-color:rgba(120,235,255,0.9);animation:spin 7s linear infinite reverse}
  .r3{width:116px;height:116px;border-color:rgba(120,235,255,0.5);border-bottom-color:rgba(180,245,255,0.95);animation:spin 4s linear infinite}
  .core{width:70px;height:70px;border-radius:50%;
    background:radial-gradient(circle at 50% 45%, #d6f6ff 0%, #4fd2ff 38%, #1f8ed6 70%, #0a3b66 100%);
    box-shadow:0 0 22px 6px rgba(79,210,255,0.6),0 0 60px 18px rgba(52,160,255,0.32);
    animation:breathe 2.8s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes breathe{0%,100%{transform:scale(0.92)}50%{transform:scale(1.06)}}

  /* States */
  .orb.listening{transform:scale(calc(1 + var(--level)*0.25))}
  .orb.listening .core{animation-duration:1.1s;box-shadow:0 0 30px 10px rgba(120,235,255,0.9),0 0 90px 30px rgba(52,180,255,0.5)}
  .orb.thinking .r1{animation-duration:3s} .orb.thinking .r2{animation-duration:1.6s} .orb.thinking .r3{animation-duration:1s}
  .orb.thinking .core{animation-duration:1.4s}
  .orb.speaking .core{animation-duration:.5s;box-shadow:0 0 36px 12px rgba(150,240,255,1),0 0 110px 36px rgba(60,190,255,0.6)}
  .orb.speaking .r3{animation-duration:1.2s}

  .status{margin-top:24px;text-align:center}
  .status .row{display:flex;align-items:center;gap:9px;justify-content:center}
  .status .pdot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:breathe 1.4s ease-in-out infinite}
  .status .label{font-size:16px;letter-spacing:1px;color:var(--cyan-soft)}
  .status .hint{font-size:12px;color:var(--muted);margin-top:6px}

  /* Chat */
  .chat{flex:1 1 auto;overflow-y:auto;padding:10px 24px 4px}
  .chat::-webkit-scrollbar{width:6px} .chat::-webkit-scrollbar-thumb{background:rgba(80,180,255,0.2);border-radius:3px}
  .bubble{margin:9px 0;display:flex}
  .bubble.me{justify-content:flex-end}
  .bubble .txt{padding:9px 14px;font-size:14px;max-width:74%;line-height:1.45}
  .bubble.me .txt{background:rgba(52,208,255,0.12);border:1px solid rgba(52,208,255,0.25);border-radius:14px 14px 4px 14px;color:#dff2ff}
  .bubble.jarvis .txt{background:rgba(255,255,255,0.04);border:1px solid rgba(120,160,200,0.15);border-radius:14px 14px 14px 4px;color:#bcd6ef}

  /* Controls */
  .controls{display:flex;align-items:center;justify-content:center;gap:18px;padding:16px 20px 24px;border-top:1px solid var(--line)}
  .cbtn{background:none;border:1px solid rgba(120,160,200,0.25);color:#7fa7cf;width:46px;height:46px;border-radius:50%;font-size:16px;cursor:pointer;transition:.15s}
  .cbtn:hover{border-color:var(--cyan);color:var(--cyan)}
  .cbtn.active{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 14px rgba(52,208,255,0.4)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span><span class="name">J A R V I S</span></div>
    <span class="meta" id="meta">MINDWAVE · OFFLINE</span>
  </div>

  <div class="stage">
    <div class="orb" id="orb">
      <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
      <div class="core"></div>
    </div>
    <div class="status">
      <div class="row"><span class="pdot"></span><span class="label" id="statusLabel">Bereit</span></div>
      <div class="hint" id="statusHint">Mikrofon aktivieren und einfach sprechen</div>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="controls">
    <button class="cbtn" id="micBtn" title="Mikrofon an/aus">🎙️</button>
    <button class="cbtn" id="resetBtn" title="Gespräch zurücksetzen">↺</button>
  </div>
</div>

<script>
// ===== Einstellungen (bei Bedarf nachjustieren) =====
const VOLUME_THRESHOLD = 0.025;   // ab wann gilt es als Sprache (0..1)
const SILENCE_MS       = 1200;    // wie lange Stille = "fertig gesprochen"
const MIN_SPEECH_MS    = 350;     // kürzere Geräusche ignorieren

const orb = document.getElementById('orb');
const statusLabel = document.getElementById('statusLabel');
const statusHint = document.getElementById('statusHint');
const chat = document.getElementById('chat');
const micBtn = document.getElementById('micBtn');
const resetBtn = document.getElementById('resetBtn');
const meta = document.getElementById('meta');

let active = false;            // Mikrofon an?
let stream, audioCtx, analyser, recorder;
let chunks = [];
let speaking = false;         // sprichst DU gerade?
let speechStart = 0, lastVoice = 0;
let busy = false;             // Jarvis denkt/spricht gerade

function setState(state, label, hint){
  orb.className = 'orb' + (state ? ' ' + state : '');
  if(label) statusLabel.textContent = label;
  if(hint !== undefined) statusHint.textContent = hint;
}

function addBubble(who, text){
  const b = document.createElement('div');
  b.className = 'bubble ' + (who === 'me' ? 'me' : 'jarvis');
  b.innerHTML = '<div class="txt"></div>';
  b.querySelector('.txt').textContent = text;
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
}

async function startMic(){
  stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true, noiseSuppression:true}});
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  await audioCtx.resume();          // Audio-Wiedergabe im Klick-Kontext freischalten (Safari)
  const src = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  src.connect(analyser);

  recorder = new MediaRecorder(stream, {mimeType: pickMime()});
  recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = onUtteranceEnd;

  active = true;
  micBtn.classList.add('active');
  meta.textContent = 'MINDWAVE · ONLINE';
  setState('', 'Bereit', 'Sprich einfach — ich höre zu');
  loop();
}

function stopMic(){
  active = false;
  micBtn.classList.remove('active');
  meta.textContent = 'MINDWAVE · OFFLINE';
  setState('', 'Pausiert', 'Mikrofon aktivieren und einfach sprechen');
  if(recorder && recorder.state !== 'inactive') recorder.stop();
  if(stream) stream.getTracks().forEach(t => t.stop());
  if(audioCtx) audioCtx.close();
}

function pickMime(){
  const opts = ['audio/webm;codecs=opus','audio/webm','audio/mp4'];
  for(const o of opts){ if(MediaRecorder.isTypeSupported(o)) return o; }
  return '';
}

function rms(){
  const buf = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(buf);
  let sum = 0;
  for(let i=0;i<buf.length;i++){ const v=(buf[i]-128)/128; sum += v*v; }
  return Math.sqrt(sum/buf.length);
}

function loop(){
  if(!active) return;
  requestAnimationFrame(loop);
  if(busy) return;                       // während Jarvis denkt/spricht: nicht zuhören

  const level = rms();
  orb.style.setProperty('--level', Math.min(level*6, 1).toFixed(2));
  const now = performance.now();

  if(level > VOLUME_THRESHOLD){
    lastVoice = now;
    if(!speaking){
      speaking = true; speechStart = now; chunks = [];
      try{ recorder.start(); }catch(e){}
      setState('listening', 'Höre zu …', 'sprich weiter …');
    }
  } else if(speaking && now - lastVoice > SILENCE_MS){
    // fertig gesprochen
    speaking = false;
    if(now - speechStart < MIN_SPEECH_MS){
      try{ if(recorder.state!=='inactive') recorder.stop(); }catch(e){}
      chunks = [];
      setState('', 'Bereit', 'Sprich einfach — ich höre zu');
      return;
    }
    busy = true;
    setState('thinking', 'Denke nach …', '');
    try{ if(recorder.state!=='inactive') recorder.stop(); }catch(e){}
  }
}

async function onUtteranceEnd(){
  if(chunks.length === 0){ busy = false; return; }
  const blob = new Blob(chunks, {type: recorder.mimeType || 'audio/webm'});
  chunks = [];

  const fd = new FormData();
  fd.append('audio', blob, 'speech.webm');
  try{
    const res = await fetch('/api/talk', {method:'POST', body:fd});
    const data = await res.json();
    if(data.empty || !data.text){ busy=false; setState('','Bereit','Sprich einfach — ich höre zu'); return; }
    addBubble('me', data.text);
    addBubble('jarvis', data.answer);
    await playAudio(data.audio);
  }catch(e){
    setState('','Fehler','Bitte nochmal versuchen');
  }
  busy = false;
  if(active) setState('', 'Bereit', 'Sprich einfach — ich höre zu');
}

async function playAudio(b64){
  if(!b64) return;
  setState('speaking', 'Spricht …', '');
  // base64 → ArrayBuffer
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  try{
    if(audioCtx.state === 'suspended') await audioCtx.resume();
    const buffer = await audioCtx.decodeAudioData(bytes.buffer);
    await new Promise(resolve => {
      const node = audioCtx.createBufferSource();
      node.buffer = buffer;
      node.connect(audioCtx.destination);
      node.onended = resolve;
      node.start(0);
    });
  }catch(e){
    // Fallback: normales Audio-Element mit korrektem MIME
    await new Promise(resolve => {
      const a = new Audio('data:audio/mpeg;base64,' + b64);
      a.onended = resolve; a.onerror = resolve;
      a.play().catch(resolve);
    });
  }
}

micBtn.addEventListener('click', () => { active ? stopMic() : startMic().catch(err => {
  setState('', 'Kein Mikrofon', 'Zugriff im Browser erlauben'); console.error(err);
}); });

resetBtn.addEventListener('click', async () => {
  await fetch('/api/reset', {method:'POST'});
  chat.innerHTML = '';
});
</script>
</body>
</html>
